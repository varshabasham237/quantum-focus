<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="QuantumFocus — A quantum-inspired, privacy-first anti-distraction system that helps students manage focus and study sessions using probabilistic models." />
  <title>QuantumFocus — Quantum Anti-Distraction System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="app">
    <nav id="sidebar" class="sidebar" aria-label="Main Navigation">
      <div class="sidebar-brand">
        <div class="brand-icon" id="brand-orb">
          <div class="orb-ring"></div>
          <div class="orb-core"></div>
        </div>
        <span class="brand-name">Quantum<strong>Focus</strong></span>
      </div>
      <ul class="nav-links" id="nav-links">
        <li>
          <a href="#dashboard" class="nav-link active" data-page="dashboard" id="nav-dashboard">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            <span>Dashboard</span>
          </a>
        </li>
        <li>
          <a href="#timer" class="nav-link" data-page="timer" id="nav-timer">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <span>Focus Timer</span>
          </a>
        </li>
        <li>
          <a href="#analytics" class="nav-link" data-page="analytics" id="nav-analytics">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
            <span>Analytics</span>
          </a>
        </li>
        <li>
          <a href="#settings" class="nav-link" data-page="settings" id="nav-settings">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            <span>Settings</span>
          </a>
        </li>
      </ul>
      <div class="sidebar-footer">
        <div class="privacy-badge">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          <span>100% Private</span>
        </div>
      </div>
    </nav>

    <main id="main-content" class="main-content">
      <div id="page-container" class="page-container"></div>
    </main>

    <div id="toast-container" class="toast-container"></div>

    <!-- Check-in Modal -->
    <div id="checkin-overlay" class="modal-overlay hidden">
      <div class="modal checkin-modal">
        <div class="modal-glow"></div>
        <h2>🔬 Focus Check-In</h2>
        <p>The quantum observer is measuring your state.<br/>How focused do you feel right now?</p>
        <div class="checkin-options" id="checkin-options">
          <button class="checkin-btn focused" data-state="focused" id="checkin-focused">
            <span class="checkin-icon">🎯</span>
            <span>Deep Focus</span>
          </button>
          <button class="checkin-btn drifting" data-state="drifting" id="checkin-drifting">
            <span class="checkin-icon">🌊</span>
            <span>Drifting</span>
          </button>
          <button class="checkin-btn distracted" data-state="distracted" id="checkin-distracted">
            <span class="checkin-icon">🌀</span>
            <span>Distracted</span>
          </button>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
